<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 240" width="1240" height="240" role="img" aria-label="BuilderShip">
  <defs>
    <linearGradient id="lBuilder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3271DC"/>
      <stop offset="55%" stop-color="#1B4BB1"/>
      <stop offset="100%" stop-color="#11357E"/>
    </linearGradient>
    <linearGradient id="lShip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FDBF6"/>
      <stop offset="55%" stop-color="#23B7E2"/>
      <stop offset="100%" stop-color="#1485AE"/>
    </linearGradient>
    <linearGradient id="lShipBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DD3F5"/>
      <stop offset="55%" stop-color="#23B7E2"/>
      <stop offset="100%" stop-color="#1485AE"/>
    </linearGradient>
    <filter id="lShadow" x="-4%" y="-12%" width="108%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0a0f1c" flood-opacity="0.36"/>
    </filter>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Bungee&amp;display=swap');
    </style>
  </defs>

  <g filter="url(#lShadow)">
    <!-- Mark: Ship icon scaled to 150x150 (1.5625 of 96) -->
    <g transform="translate(40, 50) scale(1.5625)">
      <rect width="96" height="96" rx="19" fill="url(#lShipBadge)" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
      <line x1="48" y1="17" x2="48" y2="63" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M 51 22 L 51 58 L 76 58 Z" fill="#fff"/>
      <path d="M 45 30 L 45 58 L 27 58 Z" fill="#fff" opacity="0.92"/>
      <path d="M 14 63 Q 19 80, 35 80 L 61 80 Q 77 80, 82 63 Z" fill="#fff"/>
      <path d="M 12 86 Q 27 82, 41 86 T 66 86 T 86 86" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Wordmark -->
    <text x="220" y="170" text-anchor="start"
      font-family="'Bungee', system-ui, sans-serif" font-size="108"
      stroke="#fff" stroke-width="13" stroke-linejoin="round" stroke-miterlimit="2" paint-order="stroke">
      <tspan fill="url(#lBuilder)">Builder</tspan><tspan fill="url(#lShip)">Ship</tspan>
    </text>
  </g>
</svg>
